# OpenSSF Scorecard — Issue #2277
#
# action の SHA pin 漏れ・token 権限過大・branch 保護の劣化などセキュリティ姿勢の
# 後退を継続監視する。public リポジトリで無料利用でき、結果は code scanning
# アラートに集約される。
#
# public repo 向けセキュリティ方針:
# - permissions はデフォルト read-only（read-all）で、job 単位で必要最小限のみ付与
# - action は full SHA で pin する
name: Scorecard supply-chain security

on:
  # Branch-Protection check はデフォルトブランチのみ対応
  branch_protection_rule:
  # Maintained check を定期的に更新するため
  schedule:
    - cron: "30 1 * * 6"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # job レベルの permissions はワークフローレベルの read-all を完全に上書きするため
      # （マージされない）、actions/checkout に必要な contents: read を明示する。
      contents: read
      # code scanning ダッシュボードへの結果アップロードに必要
      security-events: write
      # OpenSSF REST API への結果公開（publish_results）に必要
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3.37.3
        with:
          sarif_file: results.sarif
